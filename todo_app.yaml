apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app19
  labels:
    app: todo-app19
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-app19
  template:
    metadata:
      labels:
        app: todo-app19
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: todo-app19
        image: 121531024010.dkr.ecr.ap-northeast-2.amazonaws.com/todo-app19:latest
        ports:
        - containerPort: 5000